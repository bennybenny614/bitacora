<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bitácora" />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="manifest" href="manifest.json" />
    <title>Bitácora</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }
      input, select, textarea, button {
        font-family: inherit;
        font-size: 14px;
        border: 0.5px solid #ccc;
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
        color: #1a1a1a;
        outline: none;
      }
      button {
        cursor: pointer;
        background: transparent;
        border: 0.5px solid #bbb;
        padding: 6px 12px;
        border-radius: 20px;
      }
      button:active { opacity: 0.7; }
      input:focus, textarea:focus, select:focus { border-color: #888; }
      mark { background: #FAEEDA; color: #633806; border-radius: 2px; padding: 0 1px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="app.js" type="text/babel"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
  </body>
</html>
